name: SDK drift watch

# Daily metadata-only check of @anthropic-ai/claude-agent-sdk (plus its
# bundled Stainless @anthropic-ai/sdk dep and the CC version string) against
# the SDK/Stainless/CC constants dario's bundled template is pinned to.
#
# Complements cc-drift-watch.yml, which downloads + scans the ~235MB native
# CC binary. This one runs in seconds on npm metadata alone (scripts/
# check-sdk-drift.mjs uses `npm view`), so it's cheap to run daily as an
# early signal — especially relevant around the 2026-06-15 Agent-SDK /
# interactive-CC billing split, where SDK-side wire changes are the thing
# most likely to move first.
#
# scripts/check-sdk-drift.mjs exits 0 = aligned, 1 = drift (with a JSON
# report on stdout), 2 = infra error (npm registry/network failed after the
# script's own retries). On drift (1) we open/refresh a single
# `sdk-drift`-labeled issue; on a clean run (0) we auto-close any open one;
# on an infra error (2) we log a warning and pass — a flaky registry must not
# page or churn the issue. A genuine crash (exit 1 with NO valid JSON report)
# still fails the run so it surfaces red rather than as a false drift issue.
#
# Metadata-only: no `npm ci`, no build. check-sdk-drift.mjs imports only
# node builtins, reads src/cc-template-data.json directly, and shells out to
# `npm view`.

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC, offset from the other watchers
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sdk-drift-watch
  cancel-in-progress: false

jobs:
  sdk-drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: askalf/checkout-with-retry@744195501c3e2b794c50370b753a7b8c93d084f5  # v1.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Run SDK drift check
        id: check
        run: |
          set +e
          node scripts/check-sdk-drift.mjs > sdk-drift.json 2> sdk-drift.err
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "No SDK drift — pins aligned."
            cat sdk-drift.json
            exit 0
          fi
          if [ "$code" -eq 2 ]; then
            echo "::warning::SDK drift check could not complete (npm registry/infra error after retries) — skipping this run, not treating as drift."
            cat sdk-drift.json 2>/dev/null || true
            cat sdk-drift.err 2>/dev/null || true
            exit 0
          fi
          # code is 1: real drift if a valid JSON report landed on stdout,
          # else a genuine crash (no parseable report — registry/network error).
          if node -e "JSON.parse(require('fs').readFileSync('sdk-drift.json','utf8'))" 2>/dev/null; then
            echo "SDK DRIFT detected:"
            cat sdk-drift.json
          else
            echo "::error::check-sdk-drift.mjs failed without a valid JSON report — treating as infra/registry error, not drift."
            cat sdk-drift.err
            exit "$code"
          fi

      - name: Open / refresh sdk-drift issue
        if: steps.check.outputs.exit_code == '1'
        run: |
          set -eo pipefail

          # Self-bootstrap the label so a fresh repo doesn't fail on create.
          gh label create sdk-drift \
            --color BFD4F2 \
            --description "Agent-SDK / Stainless / CC pin drift (sdk-drift-watch.yml)" \
            --force -R "$GITHUB_REPOSITORY" || true

          body_file=$(mktemp)
          {
            echo "## Agent-SDK drift detected"
            echo ""
            echo "Generated by \`.github/workflows/sdk-drift-watch.yml\` on $(date -Iseconds)."
            echo ""
            echo "\`scripts/check-sdk-drift.mjs\` found the bundled template's pinned SDK / Stainless / CC constants out of sync with npm latest:"
            echo ""
            echo '```json'
            cat sdk-drift.json
            echo '```'
            echo ""
            echo "This is a **metadata-only early signal** — it does not auto-patch. If the drift is real, fold the new pins into the next template rebake / release. If it's noise (e.g. a pre-release SDK bump dario intentionally doesn't track yet), close this issue; it reopens only if drift is still present on the next daily run."
          } > "$body_file"

          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --label sdk-drift --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" -R "$GITHUB_REPOSITORY" --body-file "$body_file"
            gh issue comment "$existing" -R "$GITHUB_REPOSITORY" \
              --body "Drift still present as of $(date -Iseconds) ([run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID))."
            echo "refreshed existing issue #$existing"
          else
            gh issue create -R "$GITHUB_REPOSITORY" \
              --title "Agent-SDK drift detected" \
              --label sdk-drift \
              --body-file "$body_file"
          fi

      - name: Auto-close sdk-drift issue on clean run
        if: steps.check.outputs.exit_code == '0'
        run: |
          set -eo pipefail
          open_issues=$(gh issue list -R "$GITHUB_REPOSITORY" --label sdk-drift --state open --json number --jq '.[].number')
          for n in $open_issues; do
            gh issue close "$n" -R "$GITHUB_REPOSITORY" \
              --comment "Auto-closed: SDK / Stainless / CC pins back in sync on [run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          done
