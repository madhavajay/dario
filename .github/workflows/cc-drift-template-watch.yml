name: CC template drift watch (self-hosted)

# Watches for "same-binary remote-config drift" — the class of CC wire-shape
# change documented in v4.2.1's CHANGELOG entry. Runs `capture-and-bake.mjs
# --check` against a live CC install on a self-hosted runner; on detection,
# auto-rebakes the template, pushes to a bot branch, and opens a PR (v4.4.0).
#
# Pairs with `cc-drift-watch.yml` (catches npm-release-level drift, runs on
# github-hosted runner, no auth needed). This workflow catches everything
# the npm-release watcher can't: silent in-version wire changes, system
# prompt edits, beta header additions/removals — all of which arrive via
# Anthropic's CC remote-config and leave the static binary unchanged.
#
# Self-hosted requirement: a runner with @anthropic-ai/claude-code installed
# AND authenticated (~/.claude/.credentials.json or DARIO_CLAUDE_BIN env var).
# Hetzner / DO / EC2 / etc — anything dedicated. Setup: docs/drift-monitor.md.
#
# Runs every 30 min when the runner is online. Idempotent: if drift persists
# across cycles AND a bot rebake PR is already open, no new PR is opened
# (the existing one stays current). When the template is re-baked + merged,
# the issue auto-closes on the next clean cycle.
#
# v4.4.0 — auto-rebake closes the manual-remediation step in the loop.
# Previously: drift detected → issue opened → maintainer SSHes to a CC-
# installed machine → runs capture-and-bake → commits + opens PR. Now:
# drift detected → issue opened → bot opens PR with the re-bake → maintainer
# reviews compat-test result + diff and clicks merge. NOT auto-merged —
# template content is the wire-shape contract; a human approves the bake.
#
# LABEL-only drift (exit 3): `capture-and-bake --check` also distinguishes the
# case where the live wire shape MATCHES the bundle but the bundled `_version`
# label lags the installed CC version. That's the signal sdk-drift-watch.yml
# raises (it compares `_version` against npm) with nothing to re-bake. This
# workflow ships it as a deterministic label bump (scripts/label-sync.mjs) on
# a bot/template-label-* branch and AUTO-MERGES it — safe because the empty
# computeDrift proves the shape is byte-identical, so only the version string
# moves (same risk class cc-drift-watch.yml auto-merges for maxTested). This
# closes the last hand-PR step in the sdk-drift loop (was #418 / #427 / #451).

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write       # v4.4.0: push the auto-rebake commit to bot/* branches
  issues: write
  pull-requests: write  # v4.4.0: open the auto-rebake PR

jobs:
  template-drift-check:
    # Runs only on the self-hosted runner labeled `dario-drift`. Github-hosted
    # runners don't have CC + OAuth, so this job effectively gates on whether
    # a maintainer has registered a runner with that label.
    runs-on: [self-hosted, dario-drift]
    timeout-minutes: 8
    steps:
      - uses: askalf/checkout-with-retry@744195501c3e2b794c50370b753a7b8c93d084f5  # v1.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install + build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Pin OAuth credential to platform-dario canonical (sole-refresher)
        # The platform dario container is the SOLE refresher of the shared Max
        # OAuth (see the "no refresh from this side" note on the next step). But CC
        # refreshes via atomic tmp+rename, which REPLACES the /root/.claude symlink
        # with a regular file — splitting the shared refresh-token family across two
        # files that then rotate each other to death via Anthropic refresh-token
        # reuse-detection (the 2026-06-23 fleet outage: runner refreshed at 05:37 on
        # a split file, container presented the rotated-away token at 06:00 → whole
        # family invalidated). Re-link to the container's canonical before the
        # Max-OAuth step so the runner reads its always-fresh token and never
        # refreshes here. See docs/recovery.md "OAuth credential dead".
        run: |
          CANON=/var/lib/askalf-dario/credentials.json
          if [ -e "$CANON" ]; then
            mkdir -p /root/.claude /root/.dario
            ln -sfn "$CANON" /root/.claude/.credentials.json
            ln -sfn "$CANON" /root/.dario/credentials.json
            echo "pinned runner OAuth credential -> $CANON (inode $(stat -L -c %i "$CANON"))"
          else
            echo "::warning::canonical $CANON missing — platform dario down? proceeding as-is"
          fi

      - name: Run drift check
        id: check
        # Exit codes from capture-and-bake.mjs --check:
        #   0 — no drift, template matches live capture
        #   1 — infrastructure failure (CC not on PATH, capture timeout, or
        #       the runner's installed CC is OLDER than the bundle's capture —
        #       an older binary re-captures the previous wire shape, so its
        #       "drift" would auto-rebake a template DOWNGRADE (PR #632); fix
        #       is `npm i -g @anthropic-ai/claude-code@latest` on the runner)
        #   2 — drift detected vs current bundled template
        # We want the workflow to keep running through exit 2 so the
        # auto-rebake + issue steps can run; the final `Set job status`
        # step recovers the failure code so the workflow run reflects the
        # actual drift outcome.
        #
        # OAuth credential: shares /root/.claude/.credentials.json with the
        # platform dario container instead of the isolated /root/.claude-runner
        # path the v4.4.1 design used. Reason: the isolated credential
        # had no refresh authority — workflow fires were too sparse to
        # rotate the token before Anthropic's idle-refresh limit kicked
        # in, and recovery required interactive `dario login --manual`.
        # Sharing with the platform credential file lets platform dario's
        # 24/7 auto-refresh loop keep the token fresh; this workflow just
        # reads whatever's current, no refresh from this side. See
        # docs/drift-monitor.md.
        run: |
          set +e
          node scripts/capture-and-bake.mjs --check 2> drift-output.txt
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ $code -eq 0 ]; then
            echo "No drift detected."
            cat drift-output.txt
          elif [ $code -eq 2 ]; then
            echo "DRIFT DETECTED:"
            cat drift-output.txt
          elif [ $code -eq 3 ]; then
            echo "LABEL-ONLY DRIFT (wire shape matches; _version label is stale):"
            cat drift-output.txt
          else
            echo "Infrastructure failure (exit $code):"
            cat drift-output.txt
            exit $code
          fi

      - name: Auto-rebake + open PR
        # On drift detection (exit 2), re-bake the template (real write, not
        # --check), commit to a bot/template-rebake-* branch, push, and open
        # a PR. Skip if a bot rebake PR is already open — the existing one
        # will eventually be reviewed or rejected, and the next clean cycle
        # closes the drift issue if the existing PR resolves things.
        if: steps.check.outputs.exit_code == '2'
        id: rebake
        env:
          # v4.6.5: prefer DARIO_DRIFT_BOT_PAT (a fine-grained PAT) over
          # the default GITHUB_TOKEN for the gh CLI ops below. PRs created
          # by GITHUB_TOKEN don't trigger downstream workflows by design —
          # so compat-test never observed auto-rebake PRs and the
          # validation gate the v4.4.0 design promised was effectively
          # bypassed. With a PAT, GitHub treats PR creation as a regular
          # user action and `pull_request:` workflows fire normally.
          #
          # The `||` fallback to GITHUB_TOKEN means the workflow keeps
          # working pre-PAT setup — you just don't get the compat-test
          # gate on auto-rebake PRs (the same behavior as v4.4.0 through
          # v4.6.4). Setup: docs/drift-monitor.md "Optional: PAT for
          # downstream workflow triggers".
          GH_TOKEN: ${{ secrets.DARIO_DRIFT_BOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          # De-dup: skip if a bot rebake PR is already open. Match on the
          # branch-name prefix that this workflow exclusively writes to.
          existing_pr=$(gh pr list --state open --search "head:bot/template-rebake-" --json number,headRefName,url --jq '.[0]' || echo "")
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            pr_url=$(echo "$existing_pr" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).url")
            pr_number=$(echo "$existing_pr" | node -pe "JSON.parse(require('fs').readFileSync(0,'utf8')).number")
            echo "existing auto-rebake PR is still open: $pr_url"
            {
              echo "pr_url=$pr_url"
              echo "pr_number=$pr_number"
              echo "skipped=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run the real bake. Writes src/cc-template-data.json.
          node scripts/capture-and-bake.mjs

          # Sanity: did the bake actually change the bundle?
          if git diff --quiet -- src/cc-template-data.json; then
            echo "::warning::--check reported drift but bake produced no diff vs HEAD — likely a transient capture; skipping PR"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="bot/template-rebake-$(date -u +%Y%m%d-%H%M%S)"
          git config user.email "actions@github.com"
          git config user.name "cc-drift-template-watch[bot]"
          git checkout -b "$branch"

          # Version-bump + CHANGELOG promotion so merging this PR triggers
          # cc-drift-auto-release.yml. Without it the rebake lands on master
          # with no version change, the auto-release version-gate fast-exits,
          # and the freshly-baked template never ships to npm (it only shipped
          # for #317 because an unrelated release happened to ride along).
          new_version=$(node scripts/rebake-release-prep.mjs)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

          git add src/cc-template-data.json package.json CHANGELOG.md
          git commit -m "auto-rebake: template drift detected $(date -u +%Y-%m-%dT%H:%MZ) (v$new_version)"
          git push origin "$branch"

          # PR body uses the same drift-output.txt the issue does, so the
          # reviewer can decide ship-or-investigate from inside the PR alone.
          # v4.7.0: lead with the structured drift-summary.md (one-line
          # verdict + per-axis breakdown), keep the raw [bake] log for
          # detail.
          pr_body_file=$(mktemp)
          {
            echo "## Auto-rebake from class-B drift detection"
            echo ""
            echo "Generated by [\`cc-drift-template-watch.yml\`](.github/workflows/cc-drift-template-watch.yml) on $(date -Iseconds)."
            echo ""
            echo "The watcher's \`--check\` exited 2 against a live capture from the self-hosted runner. This PR contains the freshly-baked \`src/cc-template-data.json\` from that capture (with the v4.2.2 platform-superset preservation applied), plus a patch version bump to \`v$new_version\` and a CHANGELOG entry — so merging ships the rebake to npm via \`cc-drift-auto-release.yml\`."
            echo ""
            if [ -f drift-summary.md ]; then
              echo "### Summary"
              echo ""
              cat drift-summary.md
              echo ""
            fi
            echo "### Drift report"
            echo ""
            echo '```'
            cat drift-output.txt
            echo '```'
            echo ""
            echo "### Validation"
            echo ""
            echo "Compat-test (\`compat-test-self-hosted.yml\`) will auto-fire on this PR because it touches \`src/cc-template-data.json\`. If it goes green, this is mergeable as-is. If it fails, the rebake captured something Anthropic isn't ready to ship — close the PR, investigate manually."
            echo ""
            echo "### Why not auto-merged"
            echo ""
            echo "The bundled template is the wire-shape contract for non-CC clients. compat-test exercises passthrough mode; it cannot validate the rebuild-from-canonical path, so a human approves the bake. Approving + merging bumps the patch version and triggers \`cc-drift-auto-release.yml\` — approval is the ship gate."
            echo ""
            echo "Background: [v4.2.1 CHANGELOG entry](https://github.com/askalf/dario/blob/master/CHANGELOG.md#421---2026-05-17) documents this drift class — same CC binary, different runtime wire shape via remote configuration."
          } > "$pr_body_file"

          pr_url=$(gh pr create \
            --head "$branch" \
            --base master \
            --title "auto-rebake: template drift detected $(date +%Y-%m-%d)" \
            --body-file "$pr_body_file" \
            --label cc-drift-template)

          pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
          echo "opened $pr_url"
          {
            echo "pr_url=$pr_url"
            echo "pr_number=$pr_number"
            echo "skipped=false"
          } >> "$GITHUB_OUTPUT"

      - name: Label-sync + open auto-merge PR
        # On LABEL-only drift (exit 3): the live capture's wire shape matches
        # the bundle, but the bundled _version label lags the installed CC
        # version, so sdk-drift-watch.yml flags a pin delta with no shape to
        # re-bake. Ship a deterministic label bump (scripts/label-sync.mjs
        # touches only _version / _supportedMaxTested / the user-agent version
        # token) on a bot/template-label-* branch and turn on auto-merge.
        #
        # Auto-merge is safe here — and NOT for the exit-2 rebake above —
        # because exit 3 means computeDrift returned empty: the tools,
        # system_prompt, anthropic_beta and field orders are byte-identical at
        # the live version. Only the version label moves, the same
        # deterministic-bump risk class cc-drift-watch.yml already auto-merges
        # for SUPPORTED_CC_RANGE.maxTested. Auto-merge still gates on required
        # checks; a red check leaves the PR open with the bot branch preserved.
        if: steps.check.outputs.exit_code == '3'
        id: labelsync
        env:
          # Same PAT-or-token contract as the rebake step. The PAT identity is
          # what lets downstream CI fire on the PR (GitHub suppresses CI for
          # GITHUB_TOKEN-authored PRs, which would strand `gh pr merge --auto`
          # forever). With only GITHUB_TOKEN the PR is still opened; auto-merge
          # is best-effort below.
          GH_TOKEN: ${{ secrets.DARIO_DRIFT_BOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          # De-dup: skip if a bot label-sync PR is already open.
          existing_pr=$(gh pr list --state open --search "head:bot/template-label-" --json url --jq '.[0].url // ""' || echo "")
          if [ -n "$existing_pr" ]; then
            echo "existing label-sync PR still open: $existing_pr — skipping."
            exit 0
          fi

          target=$(tr -d '[:space:]' < label-target.txt)
          if [ -z "$target" ]; then
            echo "::warning::exit 3 but label-target.txt is empty — skipping label-sync."
            exit 0
          fi

          # Deterministic label bump + release-prep. Prints the new dario version.
          new_version=$(node scripts/label-sync.mjs "$target")

          # Sanity: the bump must have changed the bundle (guards a stale
          # label-target.txt or an already-current label).
          if git diff --quiet -- src/cc-template-data.json; then
            echo "::warning::label-sync produced no diff vs HEAD — skipping PR."
            exit 0
          fi

          branch="bot/template-label-$(date -u +%Y%m%d-%H%M%S)"
          git config user.email "actions@github.com"
          git config user.name "cc-drift-template-watch[bot]"
          git checkout -b "$branch"
          # Stage ONLY the three files label-sync touches — never `git add -A`
          # (would sweep in drift-output.txt / label-target.txt CI artifacts).
          git add src/cc-template-data.json package.json CHANGELOG.md
          git commit -m "chore(template): label refresh _version -> v$target (clears sdk-drift) (v$new_version)"
          git push origin "$branch"

          pr_body_file=$(mktemp)
          {
            echo "## Auto label-sync — wire shape unchanged"
            echo ""
            echo "Generated by [\`cc-drift-template-watch.yml\`](.github/workflows/cc-drift-template-watch.yml) on $(date -Iseconds)."
            echo ""
            echo "\`capture-and-bake.mjs --check\` captured **live CC v$target** and \`computeDrift\` returned **zero shape drift** vs the bundled template — but the bundle's \`_version\` label still read the previous version, which \`check-sdk-drift.mjs\` flags against npm (the \`sdk-drift\` signal). There is no wire-shape change to re-bake, so this PR bumps only the version-label fields:"
            echo ""
            echo "- \`_version\` and \`_supportedMaxTested\` -> \`$target\`"
            echo "- the \`claude-cli/<version>\` token in the \`user-agent\` header -> \`$target\`"
            echo ""
            echo "\`_captured\` (last real capture) and \`x-stainless-package-version\` are intentionally left untouched. Patch-bumped to \`v$new_version\` so merging ships via \`cc-drift-auto-release.yml\`, and the next \`sdk-drift-watch\` run auto-closes the signal."
            echo ""
            echo "### Why auto-merge is safe here"
            echo ""
            echo "Unlike a shape rebake (which a human reviews because the wire contract changed), this PR's **empty \`computeDrift\`** is a proof that the tools / system_prompt / beta headers / field orders are byte-identical at v$target. Only the label moves — the same deterministic-bump risk class \`cc-drift-watch.yml\` already auto-merges for \`maxTested\`. Auto-merge still gates on required checks (build x3, compat, test, docker-cap-drop-smoke); a red check leaves this PR open with the bot branch preserved."
          } > "$pr_body_file"

          pr_url=$(gh pr create \
            --head "$branch" \
            --base master \
            --title "chore(template): label refresh _version -> v$target (clears sdk-drift)" \
            --body-file "$pr_body_file" \
            --label cc-drift-template)
          echo "opened $pr_url"

          # Enable auto-merge: GitHub squash-merges once required checks pass.
          # Best-effort — a PAT-less / branch-protection-less setup just leaves
          # a green-and-mergeable PR for a human, rather than failing the run.
          gh pr merge "$pr_url" --auto --squash --delete-branch \
            || echo "::warning::could not enable auto-merge (likely no DARIO_DRIFT_BOT_PAT or auto-merge disabled) — PR left for manual merge."

      - name: Open / update drift issue
        if: steps.check.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.rebake.outputs.pr_url }}
          PR_NUMBER: ${{ steps.rebake.outputs.pr_number }}
          REBAKE_SKIPPED: ${{ steps.rebake.outputs.skipped }}
        run: |
          # De-dup: if there's already an open issue labeled cc-drift-template,
          # update it with a new comment instead of opening a duplicate.
          existing=$(gh issue list --label cc-drift-template --state open --json number --jq '.[0].number')
          body_file=$(mktemp)
          {
            echo "## Template drift detected"
            echo ""
            echo "Generated by \`.github/workflows/cc-drift-template-watch.yml\` on $(date -Iseconds)."
            echo ""
            if [ -n "$PR_URL" ]; then
              if [ "$REBAKE_SKIPPED" = "true" ]; then
                echo "**Existing auto-rebake PR still open:** $PR_URL — review + merge to resolve."
              else
                echo "**Auto-rebake PR opened:** $PR_URL — compat-test will run, then a human reviews + merges."
              fi
              echo ""
            else
              echo "**Auto-rebake skipped** (capture matched HEAD despite --check signal — likely a transient). Investigate manually if this recurs."
              echo ""
            fi
            if [ -f drift-summary.md ]; then
              echo "### Summary"
              echo ""
              cat drift-summary.md
              echo ""
            fi
            echo "### Drift report"
            echo ""
            echo '```'
            cat drift-output.txt
            echo '```'
            echo ""
            echo "Background: [v4.2.1 CHANGELOG entry](https://github.com/askalf/dario/blob/master/CHANGELOG.md#421---2026-05-17) documents this drift class — same CC binary, different runtime wire shape via remote configuration."
          } > "$body_file"

          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body-file "$body_file"
            echo "Updated existing drift issue #$existing"
          else
            gh issue create \
              --title "CC template drift detected ($(date +%Y-%m-%d))" \
              --label cc-drift-template \
              --body-file "$body_file"
          fi

      - name: Close stale drift issue
        if: steps.check.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # When the template is re-baked + merged, the next clean cycle
          # closes any open drift issue with a confirmation comment.
          existing=$(gh issue list --label cc-drift-template --state open --json number --jq '.[0].number')
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue close "$existing" --comment "Drift resolved: live capture now matches bundled template ($(date -Iseconds))."
            echo "Closed resolved drift issue #$existing"
          fi
